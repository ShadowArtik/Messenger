spring.application.name=MessengerServer

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5433/messenger?options=-c%20timezone=UTC
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Server owns the database schema (runs schema.sql on every startup; statements are idempotent)
spring.sql.init.mode=always
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
